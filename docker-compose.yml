services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8787"
    expose:
      - "8787"

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
